<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-label="Blog Spot logo">
  <title>Blog Spot brand</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <style>
    .name1 { fill:  rgb(255, 255, 255); font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-weight:900; font-size:58px; }
    .name { fill:  rgba(255, 255, 255, 0.95); font-family: Montserrat Thin; font-weight:900; font-size:58px;}

  </style>
  <!-- wordmark -->
  <g transform="translate(170,36)">
    <text class="name1" x="0" y="70">Bl</text>
    <text class="name" x="60" y="70">og Spot.</text>
  </g>
</svg>