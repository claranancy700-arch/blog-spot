<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-label="Blog Spot logo">
  <title>Blog Spot</title>
  <defs>
    <!-- wine gradient -->
    <linearGradient id="g0" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff0000"/>
      <stop offset="1" stop-color="#ffe476"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#C63C51" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#e7e7e7" stop-opacity="0.98"/>
      <stop offset="0" stop-color="#ffb5b1" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d36d00" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#fff9f9" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <style>
    .mark-ract { fill: transparent; rx: 24px; ry: 24px; filter: url(#softShadow); border: 4px solid rgb(255, 84, 84); }
    .mark-rect { fill: url(#g1); rx: 17px; ry: 17px; filter: url(#softShadow); }
    .monogram { fill: url(#g2); font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-weight:900; font-size:88px; text-anchor:middle; dominant-baseline:central; letter-spacing:-3px; }
    .monogram1 { fill: url(#g3); font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-weight:1500; font-size:130px; text-outline: 49; text-anchor:middle; dominant-baseline:central; letter-spacing:-3px; }
    .name1 { fill:  rgb(255, 255, 255); font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-weight:900; font-size:58px; }
    .name { fill:  rgba(255, 255, 255, 0.95); font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-weight:900; font-size:58px; }
    .tag  { fill: rgba(255, 255, 255, 0.95); font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-weight:600; font-size:30px; letter-spacing:0.6px; }
  </style>

  <!-- 2 merged emblems -->
<g transform="translate(0,0)">
    <rect class="mark-ract" x="16" y="5" width="212" height="170" rx="24" ry="24"/>
  <g transform="translate(0,0)">
    <rect class="mark-rect" x="37" y="30" width="130" height="130" rx="24" ry="24"/>
    <!-- bold monogram "B" centered in the mark -->
    <text class="monogram" x="90" y="89">B</text>
    <text class="monogram1" x="130" y="69">.</text>
  </g>
</g>

  <!-- wordmark -->
  <g transform="translate(170,36)">
    <text class="name1" x="0" y="70">Bl</text>
    <text class="name" x="60" y="70">og Spot</text>
    <text class="tag" x="0" y="64"></text>
  </g>
</svg>